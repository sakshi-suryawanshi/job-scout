[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long
    "F401",   # imported but unused (backward-compat stubs are all re-exports)
    "E711",   # comparison to None (existing style)
    "E712",   # comparison to True/False
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
